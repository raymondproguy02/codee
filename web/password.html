<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .password-container {
  position: relative;
  display: inline-block;
}

.password-container input {
  padding-right: 60px; /* Leave space for the button */
  padding-top: 8px;
  padding-bottom: 8px;
}

.password-container button {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #333;
}

    </style>
</head>
<body>
    <div class="password-container">
  <input type="password" id="passwordField" placeholder="Enter your password">
  <button type="button" id="toggleButton">Show</button>
  </div>
 <script>
    // Select elements from the DOM
const passwordField = document.getElementById('passwordField');
const toggleButton = document.getElementById('toggleButton');

// Listen for a click on the toggle button
toggleButton.addEventListener('click', () => {
  // Check the current type of the password input
  if (passwordField.type === 'password') {
    passwordField.type = 'text';
    toggleButton.textContent = 'Hide'; // Update button text
  } else {
    passwordField.type = 'password';
    toggleButton.textContent = 'Show'; // Update button text
  }
});

 </script>
</body>
</html>
